<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BETA v0.2 Чат на WebSocket</title>
  <link rel="stylesheet" href="./styles/style.css" />
  <link rel="stylesheet" href="./styles/header.css" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/modal.css" />
</head>


<body>
  <div class="wrap">
    <div class="chat_container">
      <!-- Chat header -->
      <header class="chat_header">
        <div class="header_blocks">
          <div class="header_imgs">
            <img class="avatar_icon" src="./img/man.jpg" alt="" />
            <img class="avatar_icon" src="./img/man.jpg" alt="" />
            <img class="avatar_icon" src="./img/man.jpg" alt="" />
          </div>
          <div class="header_title">
            <h4 class="chat_name">📋Назва чату</h4>
            <p class="chat_activeUsers">
              Активних юзерів:
              <span class="chat_activeUsers_number">0</span>
            </p>
          </div>
          <div class="header_dots">
            <img src="./img/dots.png" alt="" />
          </div>
        </div>
      </header>


      <!-- Chat messages -->
      <ul class="main__container">
        <!-- <p class="data">8/20/2020</p> -->
      </ul>




      <!-- Chat input -->
      <div class="chat-input-box">
        <form id="form">
          <div class="chat-input">
            <button type="button" class="icon-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <g clip-path="url(#clip0_2_1356)">

                    fill="#2C2C2E" />
                </g>
                <defs>
                  <clipPath id="clip0_2_1356">
                    <rect width="16" height="16" fill="white" />
                  </clipPath>
                </defs>
              </svg>
            </button>

            <input type="text" name="text" id="input" autocomplete="off" placeholder="Написати повідомлення..." />

            <div class="right-icons">
              <button type="button" class="icon-btn" id="mic-btn">
                <svg width="24" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="23"></line>
                  <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>

              </button>

              <button type="submit" class="icon-btn send-btn">
                <svg id="send-icon-default" xmlns="http://www.w3.org/2000/svg" width="16" height="14"
                  viewBox="0 0 16 14" fill="none">
                  <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M1.54786 1.60259L2.33701 6.14018H7.20619C7.6204 6.14018 7.95619 6.47596 7.95619 6.89018C7.95619 7.30439 7.6204 7.64018 7.20619 7.64018H2.33701L1.54786 12.1777L13.8856 6.89018L1.54786 1.60259ZM0.944924 6.89018L0.0198515 1.57101C-0.0549331 1.141 0.0842088 0.701488 0.392838 0.392858C0.780623 0.00507835 1.36544 -0.107552 1.86951 0.108478L15.2719 5.85234C15.687 6.03027 15.9562 6.43849 15.9562 6.89018C15.9562 7.34186 15.687 7.75009 15.2719 7.92802L1.86951 13.6718C1.36544 13.8879 0.780623 13.7752 0.392838 13.3875C0.0842088 13.0788 -0.0549333 12.6393 0.0198515 12.2093L0.944924 6.89018Z"
                    fill="#8E8E93" />
                </svg>

                <svg style="display: none;" id="send-icon-active" xmlns="http://www.w3.org/2000/svg" width="16"
                  height="16" viewBox="0 0 16 16" fill="none">
                  <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M1.59168 2.71245L2.38083 7.25004H7.25001C7.66422 7.25004 8.00001 7.58582 8.00001 8.00004C8.00001 8.41425 7.66422 8.75004 7.25001 8.75004H2.38083L1.59168 13.2876L13.9294 8.00004L1.59168 2.71245ZM0.988747 8.00004L0.0636748 2.68087C-0.0111098 2.25086 0.128032 1.81135 0.436661 1.50272C0.824446 1.11494 1.40926 1.00231 1.91333 1.21834L15.3157 6.9622C15.7308 7.14013 16 7.54835 16 8.00004C16 8.45172 15.7308 8.85995 15.3157 9.03788L1.91333 14.7817C1.40926 14.9978 0.824446 14.8851 0.436661 14.4974C0.128032 14.1887 -0.01111 13.7492 0.0636748 13.3192L0.988747 8.00004Z"
                    fill="#007AFF" />
                </svg>
              </button>
            </div>
          </div>
        </form>
      </div>



    </div>
  </div>

  <div class="modal active registration" id="modal"> <!--active-->
    <!-- тут є клас active, він відповідає за показ вікна, треба добавити логіку що до його присвоєня модальному вікну щоб воно показалось-->

    <div class="modal_container">
      <!-- <span class="modal_close" id="closeModal">&times;</span> -->
      <!-- тут є клас &times; то хрестик, він відповідає за закриття вікна, треба добавити логіку що до його присвоєня модальному вікну щоб воно закривалось-->

      <div class="modal_header">
        <h2 class="modal_title">Registretion</h2>
        <p class="modal_text">Want to <strong class="switch_button_login">Login?</strong></p>
      </div>

      <div class="modal_content">
        <form id="userForm">

          <div class="avatar">
            <div class="avatar_img_container">
              <div class="avatar_img">
                <input type="file" id="fileInput" style="display:none;" accept="image/*">
                <label for="fileInput">
                  <img class="avatar_img_show" src="./img/man.jpg" alt="">
                </label>

              </div>
              <img class="pen" src="./img/pen.png" alt="">
            </div>


          </div>

          <div class="modal_inputs">

            <div class="input_group">
              <label for="username">Username</label>
              <input id="username" class="userNameInput" type="text" placeholder="Enter your name" required />
            </div>

            <div class="input_group">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="Enter password" required />
            </div>

          </div>
          <button class="submit" type="submit">Start chatting!</button>
        </form>


      </div>
    </div>
  </div>

  <div class="modal login" id="modal"> <!--active-->
    <!-- тут є клас active, він відповідає за показ вікна, треба добавити логіку що до його присвоєня модальному вікну щоб воно показалось-->

    <div class="modal_container">
      <!-- <span class="modal_close" id="closeModal">&times;</span> -->
      <!-- тут є клас &times; то хрестик, він відповідає за закриття вікна, треба добавити логіку що до його присвоєня модальному вікну щоб воно закривалось-->

      <div class="modal_header">
        <h2 class="modal_title">Login</h2>
        <p class="modal_text">Want to <strong class="switch_button_registration">Registrate?</strong></p>
      </div>

      <div class="modal_content">
        <form id="userForm">
          <div class="modal_inputs">
            <div class="input_group">
              <label for="username">Username</label>
              <input id="username" class="userNameInput" type="text" placeholder="Enter your name" required />
            </div>

            <div class="input_group">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="Enter password" required />
            </div>

          </div>
          <button class="submit" type="submit">Login</button>
        </form>

      </div>
    </div>
  </div>

  <script type="module" src="./scripts/sendBtn.js"></script>
  <script type="module" src="/socket.io/socket.io.js"></script>
  <script type="module" src="./scripts/index.js"></script>
  <script type="module" src="./scripts/header.js"></script>
</body>

</html>
